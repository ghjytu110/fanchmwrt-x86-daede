#
# fanchmwrt + openwrt-daede 一体化编译工作流
# 目标: x86_64 软路由固件，集成 dae + daed + luci-app-daede 代理插件
#
# 使用方法:
#   1. 将此文件放到你 GitHub 仓库的 .github/workflows/ 目录下
#   2. 手动触发 (workflow_dispatch) 或推送代码自动触发
#   3. 编译产物在 Actions -> 对应运行记录 -> Artifacts 中下载
#

name: Build fanchmwrt x86_64 with daede

on:
  workflow_dispatch:
    inputs:
      include_daede:
        description: '集成 daede 代理插件'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      build_type:
        description: '固件类型'
        required: true
        default: 'release'
        type: choice
        options:
          - 'release'
          - 'snapshot'
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/build-fanchmwrt-daede.yml'

env:
  FANCHM_SOURCE: 'https://github.com/fanchmwrt/fanchmwrt.git'
  FANCHM_BRANCH: 'fanchmwrt-25.12.4'
  DAEDE_REPO: 'https://github.com/kenzok8/openwrt-daede.git'
  TARGET: 'x86'
  TARGET_SUBTARGET: '64'
  TZ: 'Asia/Shanghai'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # ──────────────────────────────────────────────
      # 1. 环境准备
      # ──────────────────────────────────────────────
      - name: 安装编译依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext libncurses5-dev libssl-dev \
            rsync git-core unzip wget curl file \
            libelf-dev python3 python3-pyelftools python3-setuptools \
            qemu-utils qemu-system \
            llvm-dev libclang-dev ccache \
            dwarves bc linux-headers-generic \
            protobuf-compiler libprotobuf-dev \
            golang-go

          # 确保 Go 版本足够新 (dae 编译需要)
          GO_VERSION="1.23.4"
          wget -q "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" -O /tmp/go.tar.gz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf /tmp/go.tar.gz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          export PATH="/usr/local/go/bin:$PATH"
          go version

          # 设置工作目录
          echo "WORKDIR=$HOME/openwrt-build" >> "$GITHUB_ENV"

      - name: 清理磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af || true
          df -h

      # ──────────────────────────────────────────────
      # 2. 拉取源码
      # ──────────────────────────────────────────────
      - name: 克隆 fanchmwrt 源码
        run: |
          git clone --depth 1 --branch "${FANCHM_BRANCH}" \
            "${FANCHM_SOURCE}" "${WORKDIR}"
          cd "${WORKDIR}"
          echo "源码版本: $(git log -1 --format='%h %s')"

      # ──────────────────────────────────────────────
      # 3. 添加 daede 代理插件 (作为自定义 feed)
      # ──────────────────────────────────────────────
      - name: 集成 openwrt-daede 插件
        if: ${{ github.event.inputs.include_daede != 'false' }}
        run: |
          cd "${WORKDIR}"

          # 克隆 openwrt-daede 到临时目录
          git clone --depth 1 "${DAEDE_REPO}" /tmp/openwrt-daede

          # 方式1: 将各子包链接到 package 目录 (最可靠)
          mkdir -p package/kenzok8

          # 链接 dae 透明代理内核
          if [ -d /tmp/openwrt-daede/dae ]; then
            ln -sf /tmp/openwrt-daede/dae package/kenzok8/dae
            echo "  -> dae 已链接"
          fi

          # 链接 daed Web 面板
          if [ -d /tmp/openwrt-daede/daed ]; then
            ln -sf /tmp/openwrt-daede/daed package/kenzok8/daed
            echo "  -> daed 已链接"
          fi

          # 链接 luci-app-daede 管理界面
          if [ -d /tmp/openwrt-daede/luci-app-daede ]; then
            ln -sf /tmp/openwrt-daede/luci-app-daede package/kenzok8/luci-app-daede
            echo "  -> luci-app-daede 已链接"
          fi

          # 链接 vmlinux-btf (BTF 支持包)
          if [ -d /tmp/openwrt-daede/vmlinux-btf ]; then
            ln -sf /tmp/openwrt-daede/vmlinux-btf package/kenzok8/vmlinux-btf
            echo "  -> vmlinux-btf 已链接"
          fi

          echo "openwrt-daede 插件集成完成"
          ls -la package/kenzok8/

      # ──────────────────────────────────────────────
      # 4. 更新 feeds
      # ──────────────────────────────────────────────
      - name: 更新并安装 feeds
        run: |
          cd "${WORKDIR}"

          # 更新官方 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          echo "feeds 更新完成"

      # ──────────────────────────────────────────────
      # 5. 生成 .config 配置
      # ──────────────────────────────────────────────
      - name: 生成固件配置
        run: |
          cd "${WORKDIR}"

          # ---- 基础 x86_64 配置 (注意: .config 行首不能有空格) ----
          sed 's/^[[:space:]]*//' > .config << 'CFGEOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y

          # 内核 BTF 支持 (dae/daed eBPF 必需)
          CONFIG_KERNEL_DEBUG_INFO=y
          CONFIG_KERNEL_DEBUG_INFO_BTF=y
          CONFIG_KERNEL_DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT=y
          CONFIG_KERNEL_PAHOLE_AVAILABLE=y

          # 网络相关内核模块
          CONFIG_PACKAGE_kmod-sched-core=y
          CONFIG_PACKAGE_kmod-sched-bpf=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-xdp-sockets-diag=y
          CONFIG_PACKAGE_kmod-nft-tproxy=y

          # 基础依赖包
          CONFIG_PACKAGE_ca-bundle=y

          # daede 代理组件
          CONFIG_PACKAGE_dae=y
          CONFIG_PACKAGE_daed=y
          CONFIG_PACKAGE_luci-app-daede=y

          # 常用工具
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_kmod-nft-offload=y

          # 镜像配置
          CONFIG_TARGET_IMAGES_GZIP=y
          CFGEOF

          # 让 make 自动解析依赖关系，补全 .config
          make defconfig

          # 检查 v2ray-geoip/geosite 是否被自动选中 (可能不在默认 feeds 中)
          echo "===== 检查地理数据包状态 ====="
          if ! grep -q "CONFIG_PACKAGE_v2ray-geoip=y" .config; then
            echo "v2ray-geoip 未被自动选入，尝试手动添加..."
            echo "CONFIG_PACKAGE_v2ray-geoip=y" >> .config
            echo "CONFIG_PACKAGE_v2ray-geosite=y" >> .config
            make defconfig || true
          fi

          echo "===== 最终 .config 关键项 ====="
          grep -E '(CONFIG_TARGET_x86|CONFIG_PACKAGE_dae|CONFIG_PACKAGE_daed|CONFIG_PACKAGE_luci-app-daede|CONFIG_KERNEL_DEBUG_INFO_BTF|CONFIG_PACKAGE_v2ray)' .config | head -30

      # ──────────────────────────────────────────────
      # 5.5 自定义固件默认配置 (files overlay)
      # ──────────────────────────────────────────────
      - name: 自定义默认 LAN IP 为 192.168.100.1
        run: |
          cd "${WORKDIR}"

          # 创建 files overlay 目录结构
          mkdir -p files/etc/config

          # 覆盖默认网络配置，将 LAN IP 改为 192.168.100.1
          sed 's/^          //' > files/etc/config/network << 'NETEOF'
          config interface 'loopback'
          	option device 'lo'
          	option proto 'static'
          	option ipaddr '127.0.0.1'
          	option netmask '255.0.0.0'

          config interface 'lan'
          	option device 'br-lan'
          	option proto 'static'
          	option ipaddr '192.168.100.1'
          	option netmask '255.255.255.0'
          	option ip6assign '60'

          config interface 'wan'
          	option device 'eth1'
          	option proto 'dhcp'

          config interface 'wan6'
          	option device 'eth1'
          	option proto 'dhcpv6'
          NETEOF

          # 同步修改 DHCP 默认地址池 (与 LAN 同网段)
          mkdir -p files/etc/config
          sed 's/^          //' > files/etc/config/dhcp << 'DHCPEOF'
          config dnsmasq
          	option domainneeded '1'
          	option localise_queries '1'
          	option rebind_protection '1'
          	option rebind_domain '192.168.100.1'
          	option local '/lan/'
          	option domain 'lan'
          	option expandhosts '1'
          	option cachesize '1000'
          	option authoritative '1'
          	option readethers '1'
          	option leasefile '/tmp/dhcp.leases'
          	option resolvfile '/tmp/resolv.conf.d/resolv.conf.auto'
          	option nonwildcard '1'

          config dhcp 'lan'
          	option interface 'lan'
          	option start '100'
          	option limit '150'
          	option leasetime '12h'
          	option dhcpv4 'server'
          	option dhcpv6 'server'
          	option ra 'server'
          	option ra_slaac '1'

          config dhcp 'wan'
          	option interface 'wan'
          	option ignore '1'
          DHCPEOF

          echo "已设置默认 LAN IP: 192.168.100.1"
          echo "DHCP 地址池: 192.168.100.100 - 192.168.100.249"
          cat files/etc/config/network

      # ──────────────────────────────────────────────
      # 6. 下载编译所需的软件包源码
      # ──────────────────────────────────────────────
      - name: 下载软件包源码
        run: |
          cd "${WORKDIR}"
          make download -j$(nproc) 2>&1 | tee /tmp/download.log
          echo "下载完成，检查是否有错误..."
          grep -i "error\|failed" /tmp/download.log | head -20 || echo "无明显错误"

      # ──────────────────────────────────────────────
      # 7. 编译工具链
      # ──────────────────────────────────────────────
      - name: 编译工具链
        run: |
          cd "${WORKDIR}"
          make tools/install -j$(nproc) 2>&1 | tail -20
          make toolchain/install -j$(nproc) 2>&1 | tail -20
          echo "工具链编译完成"

      # ──────────────────────────────────────────────
      # 8. 编译内核 (含 BTF)
      # ──────────────────────────────────────────────
      - name: 编译内核
        run: |
          cd "${WORKDIR}"
          make target/compile -j$(nproc) 2>&1 | tail -20

          # 验证 BTF 是否生成
          echo "===== 检查 BTF 支持 ====="
          find build_dir -name "vmlinux" -path "*/linux-*/vmlinux" 2>/dev/null | head -5
          BTF_VMLINUX=$(find build_dir -name "vmlinux" -path "*/linux-*" 2>/dev/null | head -1)
          if [ -n "$BTF_VMLINUX" ]; then
            # 检查是否有 BTF 段
            pahole -F btf "$BTF_VMLINUX" 2>/dev/null && echo "BTF 信息已嵌入内核" || echo "警告: 未检测到 BTF 信息"
          fi

      # ──────────────────────────────────────────────
      # 9. 编译软件包 (含 daede)
      # ──────────────────────────────────────────────
      - name: 编译软件包
        run: |
          cd "${WORKDIR}"
          # 先编译依赖包
          make package/compile -j$(nproc) 2>&1 | tail -30
          # 安装到 staging_dir
          make package/install -j$(nproc) 2>&1 | tail -20

          echo "===== 检查 daede 包编译结果 ====="
          find bin/packages -name "*dae*" -o -name "*daed*" 2>/dev/null | head -20

      # ──────────────────────────────────────────────
      # 10. 生成最终固件镜像
      # ──────────────────────────────────────────────
      - name: 生成固件镜像
        run: |
          cd "${WORKDIR}"
          # 先尝试并行编译，失败后回退到单线程 (更稳定)
          if ! make -j$(nproc) 2>&1 | tee /tmp/build_final.log | tail -30; then
            echo "并行编译失败，尝试单线程重编译..."
            make -j1 V=s 2>&1 | tee /tmp/build_final_retry.log | tail -50
          fi

          echo "===== 编译产物 ====="
          ls -lh bin/targets/x86/64/ 2>/dev/null || echo "未找到输出目录"
          find bin/targets -type f \( -name "*.img*" -o -name "*.vdi*" -o -name "*.vmdk*" \) 2>/dev/null | head -20

      # ──────────────────────────────────────────────
      # 11. 收集编译信息
      # ──────────────────────────────────────────────
      - name: 收集编译信息
        if: always()
        run: |
          cd "${WORKDIR}"

          echo "===== 固件信息 =====" > build_info.txt
          echo "编译时间: $(date '+%Y-%m-%d %H:%M:%S')" >> build_info.txt
          echo "源码分支: ${FANCHM_BRANCH}" >> build_info.txt
          echo "源码版本: $(git log -1 --format='%h %s')" >> build_info.txt
          echo "目标平台: x86_64" >> build_info.txt
          echo "" >> build_info.txt

          echo "===== 固件文件列表 =====" >> build_info.txt
          ls -lh bin/targets/x86/64/ >> build_info.txt 2>/dev/null
          echo "" >> build_info.txt

          echo "===== daede 包信息 =====" >> build_info.txt
          find bin/packages -name "*dae*" -o -name "*daed*" 2>/dev/null >> build_info.txt

          cat build_info.txt

      # ──────────────────────────────────────────────
      # 12. 上传编译产物
      # ──────────────────────────────────────────────
      - name: 上传固件镜像
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanchmwrt-x86_64-daede-${{ github.sha }}
          path: |
            ${{ env.WORKDIR }}/bin/targets/x86/64/*.img.gz
            ${{ env.WORKDIR }}/bin/targets/x86/64/*.img
            ${{ env.WORKDIR }}/bin/targets/x86/64/*.vdi
            ${{ env.WORKDIR }}/bin/targets/x86/64/*.vmdk
            ${{ env.WORKDIR }}/bin/targets/x86/64/*.efi
            ${{ env.WORKDIR }}/bin/targets/x86/64/sha256sums
          retention-days: 7
          if-no-files-found: warn

      - name: 上传编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            ${{ env.WORKDIR }}/build_info.txt
            ${{ env.WORKDIR }}/.config
          retention-days: 7
          if-no-files-found: warn

      # ──────────────────────────────────────────────
      # 13. 发布 Release (仅在打 tag 时)
      # ──────────────────────────────────────────────
      - name: 发布 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.WORKDIR }}/bin/targets/x86/64/*.img.gz
            ${{ env.WORKDIR }}/bin/targets/x86/64/*.vdi
            ${{ env.WORKDIR }}/bin/targets/x86/64/*.vmdk
          body: |
            ## fanchmwrt x86_64 + daede 代理固件

            **源码分支**: ${{ env.FANCHM_BRANCH }}
            **编译时间**: ${{ github.run_id }}
            **集成插件**: dae + daed + luci-app-daede

            ### 镜像说明
            - `.img.gz` — 通用磁盘镜像 (可直接 dd 写入 U 盘/硬盘)
            - `.vdi` — VirtualBox 虚拟磁盘
            - `.vmdk` — VMware 虚拟磁盘

            ### 首次启动
            - 默认 LAN IP: 192.168.100.1
            - DHCP 地址池: 192.168.100.100 - 192.168.100.249
            - 管理界面: 网络 -> daede 代理
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
